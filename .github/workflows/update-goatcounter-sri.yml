name: Update GoatCounter SRI Hash

# Draait dagelijks om 03:00 UTC én is handmatig te starten via GitHub UI.
# Werkt automatisch voor alle huidige én toekomstige apps: elke HTML-pagina
# die gc.zgo.at/count.js laadt wordt gevonden en bijgewerkt.

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-sri:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bereken SHA-384 hash van GoatCounter count.js
        id: sri
        run: |
          if ! HASH=$(curl -fsSL --max-time 30 https://gc.zgo.at/count.js \
              | openssl dgst -sha384 -binary | openssl base64 -A); then
            echo "Fout: count.js kon niet worden opgehaald." >&2
            exit 1
          fi
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "Berekende hash: $HASH"

      - name: Vervang integrity-hash in alle HTML-bestanden met GoatCounter
        id: update
        run: |
          python3 - "${{ steps.sri.outputs.hash }}" <<'PYEOF'
          import re, sys
          from pathlib import Path

          new_hash = sys.argv[1]
          changed = []

          for path in sorted(Path(".").rglob("*.html")):
              text = path.read_text(encoding="utf-8")
              if "gc.zgo.at/count.js" not in text:
                  continue

              # Vervang de integrity-hash binnen het GoatCounter <script>-blok.
              # [^>]* matcht ook newlines, dus meerdere-regel tags worden correct gevonden.
              def replace_integrity(m):
                  return re.sub(
                      r'integrity="sha384-[A-Za-z0-9+/=]+"',
                      f'integrity="sha384-{new_hash}"',
                      m.group(0)
                  )

              updated = re.sub(
                  r'<script[^>]*gc\.zgo\.at/count\.js[^>]*>',
                  replace_integrity,
                  text,
              )

              if updated != text:
                  path.write_text(updated, encoding="utf-8")
                  changed.append(str(path))

          if changed:
              print("Bijgewerkte bestanden:")
              for f in changed:
                  print(f"  {f}")
          else:
              print("Hash ongewijzigd — geen bestanden bijgewerkt.")
          PYEOF

      - name: Commit en push indien gewijzigd
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Geen wijzigingen — niets te committen."
          else
            SHORT="${{ steps.sri.outputs.hash }}"
            git commit -m "GoatCounter SRI hash bijgewerkt (sha384-${SHORT:0:20}…)"
            git push
          fi
